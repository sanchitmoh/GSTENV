name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Generate data
        run: python environment/data/generator.py

      - name: Lint (ruff)
        run: ruff check . --output-format=github

      - name: Type check (mypy)
        run: mypy environment/ --ignore-missing-imports
        continue-on-error: true

      - name: Unit & property tests
        run: pytest tests/ -v --tb=short

      - name: Validate OpenEnv
        run: openenv validate .
        continue-on-error: true

  # ── Security Scanning (H5 fix) ──────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: SAST — Bandit (security lint)
        run: bandit -r environment/ -ll -ii --format json -o bandit-report.json || true

      - name: Dependency audit — pip-audit
        run: pip-audit --strict --desc
        continue-on-error: true

      - name: Secrets scan — TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  docker:
    runs-on: ubuntu-latest
    needs: [lint-test-validate, security]
    steps:
      - uses: actions/checkout@v4

      - name: Generate data
        run: |
          pip install Faker==40.12.0
          python environment/data/generator.py

      - name: Build Docker image
        run: docker build -t gstagent .

      - name: Check image size
        run: |
          SIZE=$(docker images gstagent --format "{{.Size}}")
          echo "Image size: $SIZE"

      - name: Container security scan — Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'gstagent:latest'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Health check
        run: |
          docker run -d -p 7860:7860 --name gstagent-test gstagent
          sleep 8
          curl -f http://localhost:7860/health || exit 1
          docker stop gstagent-test
          echo "Health check passed!"
